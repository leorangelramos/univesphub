<body>

    <header>
        <h1>Exame Final 📝</h1>
        <p>Cálculo de Recuperação</p>
    </header>

    <div class="container">
        <div class="calc-container">

            <div class="formula-card">
                <i data-lucide="sigma" width="20" style="vertical-align: middle;"></i> Fórmula Oficial:
                <span class="math-expr">(Média Regular + Nota Exame) ÷ 2</span>
            </div>

            <div id="msg-erro"></div>

            <div class="input-group">
                <label>Média Regular (Anterior):</label>
                <input type="text" id="mediaAnterior" placeholder="Ex: 3.5" inputmode="decimal">
            </div>

            <div class="input-group">
                <label>Nota do Exame:</label>
                <input type="text" id="notaExame" placeholder="Ex: 6.5" inputmode="decimal">
            </div>

            <button onclick="calcularExame()" class="btn-calc">Calcular Resultado</button>
            <button onclick="simularNecessario()" class="btn-simular">Quanto preciso tirar?</button>
            
            <button onclick="limparExame()" class="btn-clear">
                <i data-lucide="trash-2" width="18"></i> Limpar Tudo
            </button>

            <div id="resultado"></div>

            <button onclick="window.location.href='index.html'" class="btn-back">← Voltar ao Menu</button>
        </div>
    </div>

    <script>

        lucide.createIcons();

        // 1. Carregar média salva automaticamente
        window.onload = function() {
            let mediaSalva = localStorage.getItem('mediaUnivesp');
            if (mediaSalva) {
                document.getElementById('mediaAnterior').value = parseFloat(mediaSalva).toFixed(2);
                // Já sugere a simulação
                simularNecessario();
            }
        }

        function mostrarErro(msg) {
            const box = document.getElementById('msg-erro');
            box.innerText = msg;
            box.style.display = 'block';
            document.getElementById('resultado').style.display = 'none';
        }

        function esconderErro() {
            document.getElementById('msg-erro').style.display = 'none';
        }

        function lerNota(id) {
            let val = document.getElementById(id).value;
            if (!val) return NaN;
            return parseFloat(val.replace(',', '.'));
        }

        function calcularExame() {
            esconderErro();
            let mediaAnt = lerNota('mediaAnterior');
            let notaExame = lerNota('notaExame');

            if (isNaN(mediaAnt) || isNaN(notaExame)) {
                mostrarErro("Preencha a Média Regular e a Nota do Exame.");
                return;
            }

            if (mediaAnt > 10 || notaExame > 10 || mediaAnt < 0 || notaExame < 0) {
                mostrarErro("As notas devem ser entre 0 e 10.");
                return;
            }

            let mediaFinal = (mediaAnt + notaExame) / 2;
            let res = document.getElementById('resultado');
            
            res.style.display = 'block';
            
            // Arredondamento
            mediaFinal = Math.round(mediaFinal * 100) / 100;

            if (mediaFinal >= 5) {
                res.className = 'aprovado';
                res.innerHTML = `Nova Média Final: <strong>${mediaFinal.toFixed(2)}</strong><br>APROVADO! 🎉`;
                // Limpa o storage pois passou
                localStorage.removeItem('mediaUnivesp');
            } else {
                res.className = 'reprovado';
                res.innerHTML = `Nova Média Final: <strong>${mediaFinal.toFixed(2)}</strong><br>REPROVADO (DP). 😢`;
            }
        }

        function simularNecessario() {
            esconderErro();
            let mediaAnt = lerNota('mediaAnterior');

            if (isNaN(mediaAnt)) {
                mostrarErro("Preencha a Média Regular primeiro.");
                return;
            }

            // Fórmula inversa: (MediaAnt + X) / 2 = 5  =>  MediaAnt + X = 10  =>  X = 10 - MediaAnt
            let precisa = 10 - mediaAnt;
            let res = document.getElementById('resultado');
            
            res.style.display = 'block';

            if (precisa <= 0) {
                res.className = 'aprovado';
                res.innerHTML = "Você já tem nota suficiente para passar (Média > 5).";
            } else if (precisa > 10) {
                res.className = 'reprovado';
                res.innerHTML = `Impossível passar. Você precisaria de <strong>${precisa.toFixed(2)}</strong> no exame (Máx é 10).`;
            } else {
                res.className = '';
                res.style.background = "#fff3e0";
                res.style.border = "1px solid #ffe0b2";
                res.style.color = "#e65100";
                res.innerHTML = `Para ficar com média 5.0:<br>Você precisa tirar <strong>${precisa.toFixed(2)}</strong> no exame.`;
            }
        }

        function limparExame() {
            document.getElementById('mediaAnterior').value = '';
            document.getElementById('notaExame').value = '';
            esconderErro();
            document.getElementById('resultado').style.display = 'none';
            document.getElementById('mediaAnterior').focus();
        }
    </script>
</body>
