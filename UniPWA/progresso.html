    <style>
        .progress-header { text-align: center; margin-bottom: 20px; }
        .progress-bar-container { background: #e0e0e0; border-radius: 10px; height: 20px; width: 100%; margin: 10px 0; overflow: hidden; }
        .progress-bar { background: var(--primary); height: 100%; width: 0%; transition: width 0.5s ease; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #f9f9f9; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .stat-card h4 { font-size: 0.8rem; color: var(--text-muted); }
        .stat-card span { font-size: 1.2rem; font-weight: bold; color: var(--primary); }
        
        .semester-block { margin-bottom: 15px; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        .semester-title { background: #f0f0f0; padding: 12px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .semester-content { display: none; padding: 10px; background: #fff; }
        .semester-content.open { display: block; }
        
        .subject-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #f5f5f5; }
        .subject-info { flex: 1; text-align: left; padding-right: 10px; }
        .subject-name { font-size: 0.85rem; font-weight: 600; display: block; line-height: 1.3; }
        .subject-meta { font-size: 0.75rem; color: #666; display: block; margin-top: 4px; }
        .grade-input { width: 65px; padding: 8px; border-radius: 6px; border: 1px solid #ccc; text-align: center; font-weight: bold; }
        .status-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; margin-left: 5px; display: inline-block; }
        .status-pending { background: #eee; color: #555; }
        .status-ok { background: #d4edda; color: #155724; }
        
        .setup-screen { text-align: center; padding: 30px 20px; }
        .app-screen { display: none; }
        
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 15px; font-size: 1rem; }
    </style>

    <div id="setup-screen" class="calc-container setup-screen">

        <h2>Bem-vindo!</h2>
        <p style="margin-bottom: 20px;">Para começar, selecione o seu curso na Univesp:</p>
        <div class="input-group">
            <select id="course-select">
                <option value="">Selecione seu curso...</option>
                <optgroup label="Computação">

                    <option value="bti">Bacharelado em Tecnologia da Informação (BTI)</option>
                    <option value="computacao">Engenharia de Computação</option>

    </div>

    <div id="app-screen" class="app-screen">

            <div class="progress-header">

                <div class="stat-card">
                    <h4>TCC</h4>

                <div class="stat-card">

                </div>
                <div class="stat-card">

            </div>

            <div id="curriculum-container">
                </div>
        </div>

</div>

    // --- LÓGICA DO SISTEMA ---
    const STORAGE_KEY = 'univesp_my_progress_v2';
    let userData = {};

    document.addEventListener("DOMContentLoaded", () => {
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
        loadData();
    });

    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                userData = JSON.parse(stored);
                if (userData.courseId && coursesDB[userData.courseId]) {
                    showAppScreen();
                    renderCurriculum();
                    updateStats();
                } else {
                    showSetupScreen();
                }
            } catch (e) {
                console.error("Erro ao carregar dados", e);
                showSetupScreen();
            }
        } else {
            showSetupScreen();
        }
    }

    function showSetupScreen() {
        document.getElementById('setup-screen').style.display = 'block';
        document.getElementById('app-screen').style.display = 'none';
    }

    function showAppScreen() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
    }

    function initializeCourse() {
        const select = document.getElementById('course-select');
        const courseId = select.value;
        if (!courseId) return alert('Por favor, selecione um curso!');

        userData = {
            courseId: courseId,
            grades: {} 
        };
        saveData();
        showAppScreen();
        renderCurriculum();
        updateStats();
    }

    function resetCourse() {
        if(confirm("Tem certeza? Isso apagará todas as suas notas salvas e progresso.")) {
            localStorage.removeItem(STORAGE_KEY);
            userData = {};
            location.reload();
        }
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(userData));
        updateStats();
    }

    function updateGrade(subjectName, value) {
        let cleanValue = value.replace(',', '.');
        
        if (cleanValue === "") {
            delete userData.grades[subjectName];
        } else {
            userData.grades[subjectName] = parseFloat(cleanValue);
        }
        saveData();
        
        // Atualiza visual
        const safeId = btoa(unescape(encodeURIComponent(subjectName)));
        const inputEl = document.getElementById(`grade-${safeId}`);
        const badgeEl = document.getElementById(`badge-${safeId}`);
        
        if (!inputEl) return;

        if (userData.grades[subjectName] >= 5) {
            inputEl.style.borderColor = "#2e7d32";
            inputEl.style.backgroundColor = "#e8f5e9";
            inputEl.style.color = "#1b5e20";
            if (badgeEl) {
                badgeEl.className = "status-badge status-ok";
                badgeEl.innerText = "Aprovado";
            }
        } else if (cleanValue !== "") {
            inputEl.style.borderColor = "#c62828";
            inputEl.style.backgroundColor = "#ffebee";
            inputEl.style.color = "#b71c1c";
            if (badgeEl) {
                badgeEl.className = "status-badge status-pending";
                badgeEl.innerText = "Reprovado";
            }
        } else {
            inputEl.style.borderColor = "#ccc";
            inputEl.style.backgroundColor = "white";
            inputEl.style.color = "black";
            if (badgeEl) {
                badgeEl.className = "status-badge status-pending";
                badgeEl.innerText = "Pendente";
            }
        }
        updateStats(); // Atualiza a barra geral quando muda nota
    }

    function renderCurriculum() {
        const container = document.getElementById('curriculum-container');
        container.innerHTML = '';
        const course = coursesDB[userData.courseId];
        
        if(!course) return; 

        document.getElementById('course-title').innerText = course.name;

        course.semesters.forEach(sem => {
            const semBlock = document.createElement('div');
            semBlock.className = 'semester-block';
            
            // Verifica se o semestre está completo para marcar ícone
            const totalSubjects = sem.subjects.length;
            let approvedCount = 0;
            sem.subjects.forEach(sub => {
                if((userData.grades[sub.name] || 0) >= 5) approvedCount++;
            });
            const isComplete = approvedCount === totalSubjects;
            
            // Ícones condicionais
            let iconHtml = '<i data-lucide="chevron-down" style="width:18px;"></i>';
            if (isComplete) {
                iconHtml = '<i data-lucide="check-circle" style="color:green; width:18px;"></i>';
            }

            const bgTitle = isComplete ? '#e8f5e9' : '#f0f0f0';

            semBlock.innerHTML = `
                <div class="semester-title" style="background:${bgTitle}" onclick="toggleSemester(${sem.id})">
                    <span>${sem.id}º Semestre</span>
                    <span>${iconHtml}</span>
                </div>
                <div id="sem-content-${sem.id}" class="semester-content"></div>
            `;
            
            container.appendChild(semBlock);
            
            const contentDiv = semBlock.querySelector(`.semester-content`);
            sem.subjects.forEach(sub => {
                const safeId = btoa(unescape(encodeURIComponent(sub.name)));
                const savedGrade = userData.grades[sub.name] !== undefined ? userData.grades[sub.name] : '';
                
                let statusClass = "status-pending";
                let statusText = "Pendente";
                let styleInput = "";

                if (savedGrade !== '' && savedGrade >= 5) {
                    statusClass = "status-ok";
                    statusText = "Aprovado";
                    styleInput = "background-color: #e8f5e9; border-color: #2e7d32; color: #1b5e20;";
                } else if (savedGrade !== '') {
                    styleInput = "background-color: #ffebee; border-color: #c62828; color: #b71c1c;";
                    statusText = "Reprovado";
                }

                const item = document.createElement('div');
                item.className = 'subject-item';
                item.innerHTML = `
                    <div class="subject-info">
                        <span class="subject-name">${sub.name}</span>
                        <span class="subject-meta">${sub.ch}h • <span id="badge-${safeId}" class="status-badge ${statusClass}">${statusText}</span></span>
                    </div>
                    <input type="number" 
                        id="grade-${safeId}"
                        class="grade-input" 
                        placeholder="Nota" 
                        min="0" max="10" 
                        step="0.1"
                        value="${savedGrade}"
                        style="${styleInput}"
                        onblur="updateGrade('${sub.name}', this.value)"
                    >
                `;
                contentDiv.appendChild(item);
            });
        });
        
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    }

    function toggleSemester(id) {
        const content = document.getElementById(`sem-content-${id}`);
        content.classList.toggle('open');
    }

    function updateStats() {
        const course = coursesDB[userData.courseId];
        if(!course) return;

        let totalSubjects = 0;
        let completedSubjects = 0;
        let totalPI = 0;
        let completedPI = 0;
        let hasTCC = false;
        let tccStatus = "Não";

        course.semesters.forEach(sem => {
            sem.subjects.forEach(sub => {
                totalSubjects++;
                const grade = userData.grades[sub.name] || 0;
                const approved = grade >= 5;

                if (approved) completedSubjects++;

                if (sub.type === 'pi') {
                    totalPI++;
                    if (approved) completedPI++;
                }

                if (sub.type === 'tcc') {
                    hasTCC = true;
                    if (approved) tccStatus = "OK";
                    else tccStatus = "Pendente";
                }
            });
        });

        const percentage = totalSubjects > 0 ? Math.round((completedSubjects / totalSubjects) * 100) : 0;
        document.getElementById('main-progress').style.width = percentage + '%';
        document.getElementById('progress-text').innerText = percentage + '% Concluído';

        document.getElementById('pi-stats').innerText = (totalPI - completedPI);
        document.getElementById('tcc-stats').innerText = hasTCC ? tccStatus : "-";
        document.getElementById('completed-stats').innerText = completedSubjects;
        document.getElementById('remaining-stats').innerText = (totalSubjects - completedSubjects);
    }
</script>
